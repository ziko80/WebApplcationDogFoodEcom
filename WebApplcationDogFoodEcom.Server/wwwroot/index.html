<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawMeds - Dog Medicine & Vaccine Store</title>
    <link rel="stylesheet" href="css/site.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-inner">
            <div class="logo">🐾 <span>PawMeds</span></div>
            <nav class="nav-links">
                <a href="#" class="nav-link active" data-filter="all">All Products</a>
                <a href="#" class="nav-link" data-filter="medicines">Medicines</a>
                <a href="#" class="nav-link" data-filter="vaccines">Vaccines</a>
                <a href="#" class="nav-link" data-filter="orders">My Orders</a>
            </nav>
            <div class="header-actions">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search products...">
                </div>
                <button class="cart-btn" id="cartToggle">
                    🛒 <span class="cart-badge" id="cartBadge">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Hero Banner -->
    <section class="hero" id="heroBanner">
        <div class="container">
            <h1>Premium Medicine & Vaccines for Your Dog</h1>
            <p>Trusted brands. Vet-recommended products. Fast delivery to your door.</p>
        </div>
    </section>

    <!-- Main Content -->
    <main class="container main-content">
        <!-- Products Grid -->
        <section id="productsSection">
            <div class="section-header">
                <h2 id="sectionTitle">All Products</h2>
                <span class="product-count" id="productCount"></span>
            </div>
            <div class="products-grid" id="productsGrid"></div>
        </section>

        <!-- Orders Section (hidden by default) -->
        <section id="ordersSection" class="hidden">
            <div class="section-header">
                <h2>My Orders</h2>
            </div>
            <div id="ordersList" class="orders-list"></div>
        </section>
    </main>

    <!-- Cart Sidebar -->
    <div class="cart-overlay hidden" id="cartOverlay"></div>
    <aside class="cart-sidebar hidden" id="cartSidebar">
        <div class="cart-header">
            <h2>Shopping Cart</h2>
            <button class="close-btn" id="cartClose">✕</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="btn btn-primary btn-block" id="checkoutBtn" disabled>Proceed to Checkout</button>
            <button class="btn btn-outline btn-block" id="clearCartBtn">Clear Cart</button>
        </div>
    </aside>

    <!-- Checkout Modal -->
    <div class="modal-overlay hidden" id="checkoutModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Checkout</h2>
                <button class="close-btn" id="modalClose">✕</button>
            </div>
            <form id="checkoutForm">
                <div class="form-group">
                    <label for="customerName">Full Name</label>
                    <input type="text" id="customerName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="customerEmail">Email</label>
                    <input type="email" id="customerEmail" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="shippingAddress">Shipping Address</label>
                    <textarea id="shippingAddress" required placeholder="123 Main St, City, State, ZIP"></textarea>
                </div>
                <div class="checkout-summary" id="checkoutSummary"></div>
                <button type="submit" class="btn btn-primary btn-block">Place Order</button>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast hidden" id="toast"></div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 PawMeds — Dog Medicine & Vaccine Store. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
