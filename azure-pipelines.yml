trigger:
  branches:
    include:
      - main
      - Abhisheksingh/Devops

pool:
  vmImage: 'ubuntu-latest'

variables:
  dotnetVersion: '10.0.x'
  nodeVersion: '20.x'
  buildConfiguration: 'Release'
  serverProject: 'WebApplcationDogFoodEcom.Server/WebApplcationDogFoodEcom.Server.csproj'
  publishPath: '$(Build.ArtifactStagingDirectory)/server'
  frontendPath: 'frontend'
  frontendPublishPath: '$(Build.ArtifactStagingDirectory)/frontend'

stages:
  # ──────────────────────────────────────────────
  # Build Stage
  # ──────────────────────────────────────────────
  - stage: Build
    displayName: 'Build & Publish Artifacts'
    jobs:
      - job: BuildServer
        displayName: 'Build .NET Server'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '$(dotnetVersion)'
              includePreviewVersions: true

          - script: dotnet restore $(serverProject)
            displayName: 'Restore NuGet packages'

          - script: dotnet build $(serverProject) --configuration $(buildConfiguration) --no-restore
            displayName: 'Build Server'

          - script: dotnet publish $(serverProject) --configuration $(buildConfiguration) --no-build --output $(publishPath)
            displayName: 'Publish Server'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Server Artifact'
            inputs:
              PathtoPublish: '$(publishPath)'
              ArtifactName: 'server-drop'

      - job: BuildFrontend
        displayName: 'Build React Frontend'
        steps:
          - task: UseNode@1
            displayName: 'Install Node.js'
            inputs:
              version: '$(nodeVersion)'

          - script: npm ci
            displayName: 'Install npm dependencies'
            workingDirectory: '$(frontendPath)'

          - script: npm run build
            displayName: 'Build Frontend'
            workingDirectory: '$(frontendPath)'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Frontend Artifact'
            inputs:
              PathtoPublish: '$(frontendPath)/dist'
              ArtifactName: 'frontend-drop'

  # ──────────────────────────────────────────────
  # DEV Stage
  # ──────────────────────────────────────────────
  - stage: Dev
    displayName: 'Deploy to DEV'
    dependsOn: Build
    variables:
      - group: 'DogFoodEcom-Dev'  # Variable group for Dev environment
    jobs:
      - deployment: DeployDev
        displayName: 'Deploy to DEV'
        environment: 'dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: server-drop
                - download: current
                  artifact: frontend-drop

                - task: AzureWebApp@1
                  displayName: 'Deploy Server to Dev App Service'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    appType: 'webApp'
                    appName: '$(serverAppName)'
                    package: '$(Pipeline.Workspace)/server-drop'

                - task: AzureWebApp@1
                  displayName: 'Deploy Frontend to Dev App Service'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    appType: 'webApp'
                    appName: '$(frontendAppName)'
                    package: '$(Pipeline.Workspace)/frontend-drop'

  # ──────────────────────────────────────────────
  # QA Stage
  # ──────────────────────────────────────────────
  - stage: QA
    displayName: 'Deploy to QA'
    dependsOn: Dev
    variables:
      - group: 'DogFoodEcom-QA'  # Variable group for QA environment
    jobs:
      - deployment: DeployQA
        displayName: 'Deploy to QA'
        environment: 'qa'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: server-drop
                - download: current
                  artifact: frontend-drop

                - task: AzureWebApp@1
                  displayName: 'Deploy Server to QA App Service'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    appType: 'webApp'
                    appName: '$(serverAppName)'
                    package: '$(Pipeline.Workspace)/server-drop'

                - task: AzureWebApp@1
                  displayName: 'Deploy Frontend to QA App Service'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    appType: 'webApp'
                    appName: '$(frontendAppName)'
                    package: '$(Pipeline.Workspace)/frontend-drop'

  # ──────────────────────────────────────────────
  # UAT Stage
  # ──────────────────────────────────────────────
  - stage: UAT
    displayName: 'Deploy to UAT'
    dependsOn: QA
    variables:
      - group: 'DogFoodEcom-UAT'  # Variable group for UAT environment
    jobs:
      - deployment: DeployUAT
        displayName: 'Deploy to UAT'
        environment: 'uat'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: server-drop
                - download: current
                  artifact: frontend-drop

                - task: AzureWebApp@1
                  displayName: 'Deploy Server to UAT App Service'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    appType: 'webApp'
                    appName: '$(serverAppName)'
                    package: '$(Pipeline.Workspace)/server-drop'

                - task: AzureWebApp@1
                  displayName: 'Deploy Frontend to UAT App Service'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    appType: 'webApp'
                    appName: '$(frontendAppName)'
                    package: '$(Pipeline.Workspace)/frontend-drop'

  # ──────────────────────────────────────────────
  # Production Stage
  # ──────────────────────────────────────────────
  - stage: Production
    displayName: 'Deploy to Production'
    dependsOn: UAT
    variables:
      - group: 'DogFoodEcom-Prod'  # Variable group for Production environment
    jobs:
      - deployment: DeployProduction
        displayName: 'Deploy to Production'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: server-drop
                - download: current
                  artifact: frontend-drop

                - task: AzureWebApp@1
                  displayName: 'Deploy Server to Production App Service'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    appType: 'webApp'
                    appName: '$(serverAppName)'
                    package: '$(Pipeline.Workspace)/server-drop'

                - task: AzureWebApp@1
                  displayName: 'Deploy Frontend to Production App Service'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    appType: 'webApp'
                    appName: '$(frontendAppName)'
                    package: '$(Pipeline.Workspace)/frontend-drop'
